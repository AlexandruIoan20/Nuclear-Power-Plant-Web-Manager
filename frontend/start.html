<!DOCTYPE html>
<html lang="ro">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nuclear Plant Control | App</title>
    <!-- Este recomandat să muți referința către CSS aici, în fișierul principal -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    
    <!-- Aici va fi injectat codul HTML primit de la /start -->
    <div id="app-container">
        <p>Se inițializează sistemul de control...</p>
    </div>

    <script>
        document.addEventListener("DOMContentLoaded", () => {
            const container = document.getElementById("app-container");

            // Facem call către ruta definită în index.php
            fetch("http://localhost:8081/start")
                .then(response => {
                    if (!response.ok) {
                        throw new Error(`Eroare de server: ${response.status}`);
                    }
                    // Extragem răspunsul sub formă de text (HTML)
                    return response.text();
                })
                .then(html => {
                    // Injectăm view-ul primit în containerul nostru
                    container.innerHTML = html;
                })
                .catch(error => {
                    console.error("Eroare la încărcarea modulului Start:", error);
                    container.innerHTML = "<p style='color: red;'>Eroare critică: Nu s-a putut contacta serverul central.</p>";
                });
        });
    </script>
</body>
</html>
